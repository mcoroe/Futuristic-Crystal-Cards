<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Futuristic Crystal Cards</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <div class="background-orbs">
            <div class="orb orb-1"></div>
            <div class="orb orb-2"></div>
            <div class="orb orb-3"></div>
            <div class="orb orb-4"></div>
            <div class="orb orb-5"></div>
        </div>
        
        <div class="cards-container">
            <div class="nft-card card-blue" data-tilt>
                <div class="card-glow"></div>
                <div class="card-border"></div>
                <div class="holographic-overlay"></div>
                
                <div class="crystal-container">
                    <div class="crystal blue-crystal">
                        <div class="crystal-face face-1"></div>
                        <div class="crystal-face face-2"></div>
                        <div class="crystal-face face-3"></div>
                        <div class="crystal-face face-4"></div>
                        <div class="crystal-face face-5"></div>
                        <div class="crystal-face face-6"></div>
                    </div>
                    <div class="crystal-glow blue-glow"></div>
                </div>
                
                <div class="card-content">
                    <h2 class="card-title">UNO </h2>
                    <p class="card-description">Rare blue quantum crystal with ethereal energy patterns and holographic resonance</p>
                    <div class="card-stats">
                        <span class="rarity">NO01</span>
                        <span class="edition">#001</span>
                    </div>
                </div>
            </div>

            <div class="nft-card card-pink" data-tilt>
                <div class="card-glow"></div>
                <div class="card-border"></div>
                <div class="holographic-overlay"></div>
                
                <div class="crystal-container">
                    <div class="crystal pink-crystal">
                        <div class="crystal-face face-1"></div>
                        <div class="crystal-face face-2"></div>
                        <div class="crystal-face face-3"></div>
                        <div class="crystal-face face-4"></div>
                        <div class="crystal-face face-5"></div>
                        <div class="crystal-face face-6"></div>
                    </div>
                    <div class="crystal-glow pink-glow"></div>
                </div>
                
                <div class="card-content">
                    <h2 class="card-title">DOS</h2>
                    <p class="card-description">Mystical pink fusion crystal with plasma core and dimensional fractures</p>
                    <div class="card-stats">
                        <span class="rarity">NO02</span>
                        <span class="edition">#002</span>
                    </div>
                </div>
            </div>

            <div class="nft-card card-purple" data-tilt>
                <div class="card-glow"></div>
                <div class="card-border"></div>
                <div class="holographic-overlay"></div>
                
                <div class="crystal-container">
                    <div class="crystal purple-crystal">
                        <div class="crystal-face face-1"></div>
                        <div class="crystal-face face-2"></div>
                        <div class="crystal-face face-3"></div>
                        <div class="crystal-face face-4"></div>
                        <div class="crystal-face face-5"></div>
                        <div class="crystal-face face-6"></div>
                    </div>
                    <div class="crystal-glow purple-glow"></div>
                </div>
                
                <div class="card-content">
                    <h2 class="card-title">TRES</h2>
                    <p class="card-description">Ancient purple void crystal with temporal distortion and cosmic energy</p>
                    <div class="card-stats">
                        <span class="rarity">NO03</span>
                        <span class="edition">#003</span>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
